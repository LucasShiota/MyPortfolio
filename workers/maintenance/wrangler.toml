name = "portfolio-maintenance"
main = "index.js"
compatibility_date = "2024-03-05"

# To toggle maintenance mode via code:
# Use the patterns below
# To ENABLE maintenance mode, uncomment the live routes and comment the dev route.
# To DISABLE, do the opposite.

# 🚦 TOGGLE SWITCH
# To ENABLE maintenance mode: Uncomment the first "routes" and comment the second.
# To DISABLE maintenance mode: Comment the first "routes" and uncomment the second.

# -- ON (Maintenance mode) --
routes = ["lucasshiota.com/*", "*.lucasshiota.com/*"]

# -- OFF (Live site) --
# routes = ["dev.lucasshiota.com/*"]

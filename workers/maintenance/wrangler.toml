name = "portfolio-maintenance"
main = "index.js"
compatibility_date = "2024-03-05"

# To toggle maintenance mode via code:
# Use the patterns below
# To ENABLE maintenance mode, uncomment the live routes and comment the dev route.
# To DISABLE, do the opposite.

# 🚦 ONE-CLICK SWITCH
# Set to "true" to lock the site. Set to "false" to be LIVE.
[vars]
MAINTENANCE_MODE = "true"

# Always keep these the same. No more manual deleting!
routes = [
  "lucasshiota.com/*",
  "*.lucasshiota.com/*"
]
